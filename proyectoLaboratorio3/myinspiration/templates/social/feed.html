{% extends 'social/layout.html' %}
{% load staticfiles %}
{% load humanize %}
{% block content %}

{% for post in posts %}
<article>
    <div class="container-article">
        <img src="{% static 'icono.png' %}">
        <div>
            <h2 class="username"><a href="{% url 'profile' post.user.username %}">@{{ post.user.username}}</a></h2>
            <i class="clock"></i>
            <time data-time="#">{{ post.timestamp|naturaltime }}</time>
            <div class="post">{{ post.content }}</div>
            <div class ="activity">
                <button type = "favorite" id = "favorite">FAVORITO</button>
                <button type = "report" id = "report">REPORTAR</button>
            </div>
        </div>
    </div>
</article>

{% endfor %}

{% endblock %}
